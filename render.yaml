services:
  - type: web
    name: eduresult-backend
    env: docker
    rootDir: backend
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: eduresult-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: eduresult-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: eduresult-db
          property: password
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: eduresult-db
    databaseName: eduresult
    user: eduresult_user
    plan: free
