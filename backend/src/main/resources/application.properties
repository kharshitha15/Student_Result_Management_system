# Database Configuration (Handled programmatically in DatabaseConfig.java)
# spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
management.endpoints.web.exposure.include=health

# JWT Configuration
eduresult.jwt.secret=${JWT_SECRET:your_very_long_secret_key_for_jwt_auth_at_least_32_characters}
eduresult.jwt.expiration=86400000

# Server Configuration
server.port=${PORT:8080}
