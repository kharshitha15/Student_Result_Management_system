# Database Configuration (PostgreSQL for Production)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Create a separate schema to avoid mixing tables with your old project
spring.jpa.properties.hibernate.default_schema=eduresult
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

# JWT Configuration
eduresult.jwt.secret=${JWT_SECRET:your_very_long_secret_key_for_jwt_auth_at_least_32_characters}
eduresult.jwt.expiration=86400000

# Server Configuration
server.port=${PORT:8080}
