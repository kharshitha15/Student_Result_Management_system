# Database Configuration (PostgreSQL for Production)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:eduresult}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
eduresult.jwt.secret=${JWT_SECRET:your_very_long_secret_key_for_jwt_auth_at_least_32_characters}
eduresult.jwt.expiration=86400000

# Server Configuration
server.port=${PORT:8080}
