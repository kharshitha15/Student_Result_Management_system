# Database Configuration (MySQL for Production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/eduresult}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
eduresult.jwt.secret=${JWT_SECRET:your_very_long_secret_key_for_jwt_auth_at_least_32_characters}
eduresult.jwt.expiration=86400000

# Server Configuration
server.port=${PORT:8080}
