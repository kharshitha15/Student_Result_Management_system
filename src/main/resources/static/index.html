<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Student Result Management System</title>
    <meta name="description" content="Secure login for students and administrators of the Result Management System.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-blur"></div>
    
    <div class="auth-container">
        <div class="auth-card glass">
            <div class="auth-header">
                <h1>EduPulse</h1>
                <p id="auth-subtitle">Student Login Portal</p>
            </div>

            <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                <button id="student-tab" class="btn btn-primary" style="flex: 1; background: var(--primary);" onclick="switchTab('student')">Student</button>
                <button id="admin-tab" class="btn glass" style="flex: 1; border: 1px solid var(--glass-border);" onclick="switchTab('admin')">Admin</button>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="id-input" id="id-label">Roll Number</label>
                    <input type="text" id="id-input" class="form-input" placeholder="e.g. 2024-CS-01" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <div style="margin-bottom: 2rem;">
                    <a href="#" style="color: var(--primary); font-size: 0.9rem; text-decoration: none;">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary">
                    Login to Dashboard
                </button>
            </form>
        </div>
    </div>

    <script>
        let currentMode = 'student';

        function switchTab(mode) {
            currentMode = mode;
            const studentTab = document.getElementById('student-tab');
            const adminTab = document.getElementById('admin-tab');
            const idLabel = document.getElementById('id-label');
            const subtitle = document.getElementById('auth-subtitle');
            const idInput = document.getElementById('id-input');

            if (mode === 'student') {
                studentTab.style.background = 'var(--primary)';
                adminTab.style.background = 'transparent';
                adminTab.classList.add('glass');
                idLabel.innerText = 'Roll Number';
                subtitle.innerText = 'Student Login Portal';
                idInput.placeholder = 'e.g. 2024-CS-01';
            } else {
                adminTab.style.background = 'var(--primary)';
                studentTab.style.background = 'transparent';
                studentTab.classList.add('glass');
                idLabel.innerText = 'Admin ID';
                subtitle.innerText = 'Administrator Portal';
                idInput.placeholder = 'Admin ID';
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const rollNumber = document.getElementById('id-input').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rollNumber, password })
                });
                const data = await response.json();

                if (data.status === 'success') {
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    if (currentMode === 'student') {
                        window.location.href = 'student_portal.html';
                    } else {
                        window.location.href = 'admin_dashboard.html';
                    }
                } else {
                    alert(data.message);
                }
            } catch (error) {
                console.error('Login failed:', error);
                // For preview purposes, if the backend isn't running, still allow navigation
                if (currentMode === 'student') {
                    window.location.href = 'student_portal.html';
                } else {
                    window.location.href = 'admin_dashboard.html';
                }
            }
        });
    </script>
</body>
</html>
